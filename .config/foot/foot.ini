# foot config — ported from alacritty.toml

[main]
font = JetBrainsMono NF:size=14
font-bold = JetBrainsMono NF:style=Bold:size=14
font-italic = JetBrainsMono NF:style=Italic:size=14
pad=0x0

[scrollback]
lines=50000

[colors-dark]
alpha = 0.87
blur=true
background = 2b2e37
foreground = F2F2F2

# Normal colors
regular0 = 202020
regular1 = CC0000
regular2 = 98c379
regular3 = d19a66
regular4 = 61afef
regular5 = c678dd
regular6 = 56b6c2
regular7 = D3D7CF

# Bright colors
bright0 = 88807C
bright1 = F15D22
bright2 = 73C48F
bright3 = FFCE51
bright4 = 48B9C7
bright5 = AD7FA8
bright6 = 34E2E2
bright7 = EEEEEC

[key-bindings]
clipboard-paste = Mod4+v
clipboard-copy = Mod4+c
pipe-command-output=[wl-copy] Alt+l
