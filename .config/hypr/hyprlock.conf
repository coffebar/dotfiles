general {
    hide_cursor = true
    ignore_empty_input = true
}

animations {
    enabled = false
}

# ---------- Background ----------
background {
    monitor =
    path = ~/.config/hypr/jonas-degener-t4tn3SLE1z4-unsplash.jpg
    # blur_passes = 1
    # blur_size = 1
    # noise = 0.015
    # contrast = 1.05
    # vibrancy = 0.25
    # vibrancy_darkness = 1.3
}

# ---------- Clock ----------
label {
    monitor =
    text = $TIME
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    color = rgba(95, 98, 107, 0.6)

    position = 0, 260
    halign = center
    valign = center
}

# ---------- Date ----------
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%A, %d %B %Y')"
    font_size = 44
    font_family = DejaVu Sans
    color = rgba(200, 250, 250, 0.8)

    position = 0, 120
    halign = center
    valign = bottom
}

# ---------- Keyboard Layout ----------
label {
    monitor =
    text = $LAYOUT // $ATTEMPTS $FAIL
    font_size = 18
    font_family = DejaVu Sans
    color = rgba(200, 250, 250, 0.8)

    position = 0, 0
    halign = left
    valign = bottom
}

# ---------- Sleep Button ----------
label {
    monitor =
    text = 󰒲
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    color = rgba(200, 250, 250, 0.5)

    position = -20, 20
    halign = right
    valign = bottom

    onclick = systemctl suspend
}

# ---------- Slack Unread ----------
label {
    monitor =
    text = cmd[update:30] ~/.config/hypr/slack.sh
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    color = rgba(10, 135, 30, 0.8)

    position = 0, -40
    halign = center
    valign = top
}
